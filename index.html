<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <div class="dashboard-wrapper">
        <header class="top-nav">
            <div class="search-container">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="Search" aria-label="Search accounts">
            </div>

            <div class="user-actions">
                <button class="notification-btn" aria-label="Notifications">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </button>
                <div class="profile-avatar">IG</div>
            </div>
        </header>

        <main class="account-section">
            <h1 class="page-title">Accounts</h1>

            <section class="account-list">
                <article class="account-item active">
                    <div class="brand-group">
                        <img src="/images/anh3.png" alt="Dropbox" class="logo">
                        <div class="brand-text">
                            <h2 class="brand-name">Dropbox</h2>
                            <span class="brand-domain">dropbox.com</span>
                        </div>
                    </div>
                    <div class="account-stats">24 accounts</div>
                    <button class="action-menu" aria-label="More options">•••</button>
                </article>

                <article class="account-item">
                    <div class="brand-group">
                        <img src="/images/anh2.png" alt="Pinterest" class="logo">
                        <div class="brand-text">
                            <h2 class="brand-name">Pinterest</h2>
                            <span class="brand-domain">pinterest.com</span>
                        </div>
                    </div>
                    <div class="account-stats">3 accounts</div>
                    <button class="action-menu" aria-label="More options">•••</button>
                </article>

                <article class="account-item">
                    <div class="brand-group">
                        <img src="/images/anh1.png" alt="Microsoft" class="logo">
                        <div class="brand-text">
                            <h2 class="brand-name">Microsoft</h2>
                            <span class="brand-domain">microsoft.com</span>
                        </div>
                    </div>
                    <div class="account-stats">19 accounts</div>
                    <button class="action-menu" aria-label="More options">•••</button>
                </article>
            </section>
        </main>
    </div>

</body>

</html>
